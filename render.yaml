services:
  - type: web
    name: morgenrot-interview
    env: python
    region: singapore
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 300
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: morgenrot-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: VIDEO_UPLOAD_DIR
        value: /data/videos
    disk:
      name: interview-videos
      mountPath: /data/videos
      sizeGB: 50

databases:
  - name: morgenrot-db
    plan: free
    region: singapore
