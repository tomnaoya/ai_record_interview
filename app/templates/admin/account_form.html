{% extends "admin/base.html" %}
{% block title %}{{ 'アカウントを編集' if account else 'アカウントを追加' }}{% endblock %}
{% block page_title %}{{ 'アカウントを編集' if account else 'アカウントを追加' }}{% endblock %}

{% block content %}
<div class="form-card">
  <form method="POST" action="{{ '/admin/accounts/' + account.id|string + '/edit' if account else '/admin/accounts/new' }}">

    <div class="form-section">
      <div class="form-section-title">アカウント情報</div>
      <div class="form-row">
        <div class="form-group">
          <label>企業 <span class="required">*</span></label>
          <select name="company_id" required>
            <option value="">選択してください</option>
            {% for c in companies %}
            <option value="{{ c.id }}" {% if account and account.company_id == c.id %}selected{% endif %}>{{ c.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>権限</label>
          <select name="role">
            <option value="company" {% if not account or account.role == 'company' %}selected{% endif %}>企業担当者</option>
            <option value="admin" {% if account and account.role == 'admin' %}selected{% endif %}>システム管理者</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>氏名 <span class="required">*</span></label>
          <input type="text" name="name" required value="{{ account.name if account else '' }}" placeholder="山田 太郎">
        </div>
        <div class="form-group">
          <label>メールアドレス <span class="required">*</span></label>
          <input type="email" name="email" required value="{{ account.email if account else '' }}" placeholder="yamada@example.com">
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">パスワード{% if account %}（変更する場合のみ入力）{% endif %}</div>
      <div class="form-row">
        <div class="form-group">
          <label>パスワード {% if not account %}<span class="required">*</span>{% endif %}</label>
          <input type="password" name="password" {% if not account %}required{% endif %} placeholder="8文字以上">
        </div>
        <div class="form-group">
          <label>パスワード（確認）</label>
          <input type="password" name="password_confirm" placeholder="同じパスワードを入力">
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> 保存</button>
      <a href="/admin/accounts" class="btn btn-outline">キャンセル</a>
    </div>
  </form>
</div>
{% endblock %}
